<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleek Stitch Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      div {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid rgba(255,255,255,0.14);
        padding: 32px;
      }

      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 48px;
        line-height: 0.95;
        letter-spacing: -0.06em;
        font-weight: 500;
        margin: 0 0 14px;
      }

      p {
        color: #aaa29a;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Sleek Stitch is offline</h1>
      <p>The app is designed for offline use. Reopen it from the installed app shortcut or refresh after the app has loaded once on this device.</p>
    </div>
  </body>
</html>
